name: YAAC Requirement Pipeline

on:
  push:
    branches: [ "dev" ]
  pull_request:
    branches: [ "dev" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v2

    - name: Set up Go
      uses: actions/setup-go@v2
      with:
        go-version: 1.20
      id: go

    - name: Install dependencies
      run: |
        go get fyne.io/fyne/v2
        go get gocv.io/x/gocv

    - name: Build
      run: make build
